<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه لایف</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#f4f6f8;
}

/* هدر */
header{
  background:#e30000;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

/* نوار بالا */
.topbar{
  background:#111;
  color:white;
  text-align:center;
  padding:8px;
  font-size:12px;
}

/* سرچ */
.search{
  text-align:center;
  padding:10px;
}

.search input{
  width:85%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

/* دسته بندی */
.categories{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}

.cat{
  background:white;
  padding:8px 14px;
  border-radius:20px;
  white-space:nowrap;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  font-size:13px;
}

/* گرید محصولات */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

/* کارت */
.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card h3{
  font-size:13px;
  margin:10px;
  height:35px;
  overflow:hidden;
}

.price{
  color:#0a8f3c;
  font-weight:bold;
  margin:0 10px;
}

.btn{
  display:block;
  margin:10px;
  padding:8px;
  text-align:center;
  background:#e30000;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
}

/* موبایل بهتر */
@media(max-width:600px){
  .search input{width:90%;}
}
</style>
</head>

<body>

<div class="topbar">ارسال سریع | ضمانت کیفیت | فروشگاه لایف</div>

<header>فروشگاه لوازم خانگی لایف</header>

<div class="search">
<input placeholder="جستجوی محصول...">
</div>

<div class="categories">
<div class="cat">همه</div>
<div class="cat">یخچال</div>
<div class="cat">گاز</div>
<div class="cat">لباسشویی</div>
<div class="cat">تلویزیون</div>
<div class="cat">موبایل</div>
</div>

<div class="grid">

<div class="card">
<img src="images/fridge.jpg">
<h3>یخچال سامسونگ مدل RT50</h3>
<p class="price">25,000,000 تومان</p>
<a class="btn" href="#">مشاهده محصول</a>
</div>

<div class="card">
<img src="images/gas.jpg">
<h3>اجاق گاز استیل 5 شعله</h3>
<p class="price">8,500,000 تومان</p>
<a class="btn" href="#">مشاهده محصول</a>
</div>

<div class="card">
<img src="images/washer.jpg">
<h3>لباسشویی LG 9 کیلویی</h3>
<p class="price">18,000,000 تومان</p>
<a class="btn" href="#">مشاهده محصول</a>
</div>

</div>

</body>
</html>
